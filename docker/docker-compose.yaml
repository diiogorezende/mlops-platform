services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mlflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mlops-network

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    command: mlflow server --backend-store-uri postgresql+psycopg2://postgres:password@postgres:5432/mlflow_db --default-artifact-root /mlflow/artifacts --host 0.0.0.0
    volumes:
      - ./mlruns:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - mlops-network

volumes:
  postgres_data:

networks:
    mlops-network:
        driver: bridge